<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🍰 Cozy Kitchen</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>

<style>
body {
  background: radial-gradient(circle at top, #3a2a27, #1a1110);
  font-family: system-ui, sans-serif;
}
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
}
canvas {
  background: radial-gradient(circle, #2d1b17, #140a08);
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center text-white">

<!-- LOBBY -->
<div id="lobby" class="glass p-8 rounded-2xl w-[340px] text-center shadow-2xl">
  <h1 class="text-4xl mb-6">🍰 Cozy Kitchen</h1>

  <div class="space-y-3">
    <button id="hostBtn" class="w-full py-3 bg-orange-500 rounded-xl font-bold">Host Game</button>
    <button id="joinBtn" class="w-full py-3 bg-teal-500 rounded-xl font-bold">Join Game</button>
  </div>

  <input id="roomInput" class="hidden w-full mt-4 p-3 rounded-xl text-black"
         placeholder="Room Code">

  <input id="nameInput" class="w-full mt-4 p-3 rounded-xl text-black"
         placeholder="Your Name">

  <button id="continueBtn"
          class="w-full mt-4 py-3 bg-white text-black rounded-xl font-bold">
    Continue
  </button>

  <div id="status" class="mt-4 text-sm opacity-80"></div>

  <button id="readyBtn"
          class="hidden w-full mt-4 py-3 bg-green-500 rounded-xl font-bold">
    READY
  </button>
</div>

<!-- GAME -->
<canvas id="game" width="900" height="500" class="hidden rounded-xl shadow-2xl"></canvas>

<script>
/* ---------- STATE ---------- */
let peer, conn
let isHost = false
let localReady = false
let remoteReady = false
let started = false
let myName = "Player"

const lobby = document.getElementById("lobby")
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")
const status = document.getElementById("status")
const readyBtn = document.getElementById("readyBtn")

/* ---------- PLAYERS ---------- */
const me = { x: 200, y: 250, emoji: "🦊" }
const other = { x: 700, y: 250, emoji: "🐰" }
const speed = 4
const keys = {}

/* ---------- UI ---------- */
hostBtn.onclick = () => {
  isHost = true
  roomInput.classList.add("hidden")
  status.innerText = "Hosting game..."
}

joinBtn.onclick = () => {
  isHost = false
  roomInput.classList.remove("hidden")
  status.innerText = "Joining game..."
}

continueBtn.onclick = () => {
  myName = nameInput.value || "Player"
  initPeer()
}

/* ---------- PEER ---------- */
function initPeer() {
  peer = new Peer()

  peer.on("open", id => {
    if (isHost) {
      status.innerText = "Room Code: " + id
    } else {
      conn = peer.connect(roomInput.value.trim())
      setupConn()
    }
  })

  peer.on("connection", c => {
    if (!conn) {
      conn = c
      setupConn()
    }
  })
}

function setupConn() {
  conn.on("open", () => {
    status.innerText = "Connected — press READY"
    readyBtn.classList.remove("hidden")
  })

  conn.on("data", msg => {
    if (msg.type === "READY") {
      remoteReady = true
      checkStart()
    }
    if (msg.type === "START") startGame()
    if (msg.type === "MOVE") {
      other.x = msg.x
      other.y = msg.y
    }
  })
}

/* ---------- READY ---------- */
readyBtn.onclick = () => {
  localReady = true
  readyBtn.disabled = true
  readyBtn.innerText = "Waiting..."
  conn.send({ type: "READY" })
  checkStart()
}

function checkStart() {
  if (localReady && remoteReady && isHost && !started) {
    conn.send({ type: "START" })
    startGame()
  }
}

/* ---------- GAME ---------- */
function startGame() {
  if (started) return
  started = true

  lobby.classList.add("hidden")
  canvas.classList.remove("hidden")

  me.emoji = isHost ? "🦊" : "🐰"
  other.emoji = isHost ? "🐰" : "🦊"

  requestAnimationFrame(gameLoop)
}

function gameLoop() {
  update()
  draw()
  requestAnimationFrame(gameLoop)
}

function update() {
  if (keys["ArrowUp"]) me.y -= speed
  if (keys["ArrowDown"]) me.y += speed
  if (keys["ArrowLeft"]) me.x -= speed
  if (keys["ArrowRight"]) me.x += speed

  conn?.send({ type: "MOVE", x: me.x, y: me.y })
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height)

  ctx.font = "60px serif"
  ctx.textAlign = "center"
  ctx.textBaseline = "middle"

  ctx.fillText(me.emoji, me.x, me.y)
  ctx.fillText(other.emoji, other.x, other.y)
}

/* ---------- INPUT ---------- */
window.addEventListener("keydown", e => keys[e.key] = true)
window.addEventListener("keyup", e => keys[e.key] = false)
</script>

</body>
</html>
