<!DOCTYPE html>
<html>
<head>
  <title>Couple Compatibility Game</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; text-align: center; background:#fdf6e3 }
    button { padding:12px 20px; margin:10px; font-size:16px }
    .hidden { display:none }
  </style>
</head>

<body>

<h1>❤️ Compatibility Test</h1>

<div id="lobby">
  <input id="name" placeholder="Your name" />
  <br>
  <button onclick="createRoom()">Create Room</button>
  <button onclick="joinRoom()">Join Room</button>
  <input id="roomInput" placeholder="Room ID" />
</div>

<div id="room" class="hidden">
  <h3>Room: <span id="roomId"></span></h3>
  <p id="status">Waiting for partner...</p>
</div>

<div id="game" class="hidden">
  <h2 id="question"></h2>
  <button onclick="answer('A')">Option A</button>
  <button onclick="answer('B')">Option B</button>
</div>

<div id="result" class="hidden">
  <h2>Compatibility</h2>
  <h1 id="score"></h1>
</div>

<script>
/* ---------------- FIREBASE CONFIG ---------------- */
firebase.initializeApp({
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
});

const auth = firebase.auth();
const db = firebase.firestore();

/* ---------------- GAME DATA ---------------- */
const questions = [
  { q: "How do you handle conflicts?", A:"Talk it out", B:"Need space" },
  { q: "Weekend preference?", A:"Stay home", B:"Go out" }
];

let roomId, myUid, myName;

/* ---------------- AUTH ---------------- */
auth.signInAnonymously().then(res => {
  myUid = res.user.uid;
});

/* ---------------- CREATE ROOM ---------------- */
async function createRoom() {
  myName = name.value;
  roomId = Math.random().toString(36).substring(2,8);

  await db.collection("rooms").doc(roomId).set({
    phase: 0,
    questionIndex: 0,
    players: {
      [myUid]: { name: myName, answer: null }
    }
  });

  enterRoom();
}

/* ---------------- JOIN ROOM ---------------- */
async function joinRoom() {
  myName = name.value;
  roomId = roomInput.value;

  await db.collection("rooms").doc(roomId).update({
    [`players.${myUid}`]: { name: myName, answer: null }
  });

  enterRoom();
}

/* ---------------- ENTER ROOM ---------------- */
function enterRoom() {
  lobby.classList.add("hidden");
  room.classList.remove("hidden");
  document.getElementById("roomId").innerText = roomId;

  db.collection("rooms").doc(roomId)
    .onSnapshot(doc => handleUpdate(doc.data()));
}

/* ---------------- GAME LOGIC ---------------- */
function handleUpdate(data) {
  const players = Object.values(data.players);
  if (players.length < 2) return;

  if (data.phase === 0) {
    startQuestion(data.questionIndex);
    db.collection("rooms").doc(roomId).update({ phase: 1 });
  }

  const answers = players.map(p => p.answer).filter(a => a);
  if (answers.length === 2) {
    showResult(answers);
  }
}

function startQuestion(i) {
  game.classList.remove("hidden");
  question.innerText = questions[i].q;
}

function answer(choice) {
  db.collection("rooms").doc(roomId)
    .update({ [`players.${myUid}.answer`]: choice });
}

function showResult(ans) {
  game.classList.add("hidden");
  result.classList.remove("hidden");
  score.innerText = ans[0] === ans[1] ? "100%" : "50%";
}
</script>

</body>
</html>
