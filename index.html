<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bake Our Love 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: system-ui, sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    background: #fff;
    width: 340px;
    border-radius: 16px;
    padding: 22px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,.15);
  }

  input {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 12px;
  }

  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    background: #ff4d6d;
    color: white;
    margin-top: 8px;
    cursor: pointer;
    box-shadow: 0 6px 0 #e63950;
    transition: transform .1s ease, box-shadow .1s ease;
  }

  button:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #e63950;
  }

  .soft {
    background: #ffd6de;
    color: #333;
    box-shadow: 0 6px 0 #ffb3c1;
  }

  .hidden { display: none }
</style>
</head>

<body>

<div class="card">

  <!-- NAME -->
  <div id="nameScreen">
    <h2>💖 Bake Our Love</h2>
    <p>Your name?</p>
    <input id="nameInput" placeholder="Enter your name" />
    <button onclick="saveName()">Continue</button>
  </div>

  <!-- ROOM -->
  <div id="roomScreen" class="hidden">
    <h2>Hello <span id="myName"></span> 👋</h2>
    <button onclick="createRoom()">Create Room</button>
    <input id="roomInput" placeholder="Enter partner code" />
    <button class="soft" onclick="joinRoom()">Join Room</button>
  </div>

  <!-- WAIT -->
  <div id="waitScreen" class="hidden">
    <h2>Waiting for partner…</h2>
    <h1 id="roomCode"></h1>
    <p>Share this code ❤️</p>
  </div>

  <!-- GAME -->
  <div id="gameScreen" class="hidden">
    <h2 id="gameText"></h2>
    <button onclick="choose('A')" id="btnA"></button>
    <button onclick="choose('B')" class="soft" id="btnB"></button>
  </div>

  <!-- RESULT -->
  <div id="resultScreen" class="hidden">
    <h2 id="resultText"></h2>
    <button onclick="nextStep()">Continue Baking</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAlN3n35NJQI2-mdNnVW7oyWSu3RN2YQsw",
  authDomain: "couplegame-ee52e.firebaseapp.com",
  databaseURL: "https://couplegame-ee52e-default-rtdb.firebaseio.com",
  projectId: "couplegame-ee52e",
  storageBucket: "couplegame-ee52e.firebasestorage.app",
  messagingSenderId: "340161084050",
  appId: "1:340161084050:web:82b571b0711a48ca30c44b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let uid, name, roomId;
let step = 0;

/* GAME STEPS */
const bakingSteps = [
  {
    text: "Choose a base 🥣",
    A: "Chocolate",
    B: "Vanilla",
    match: "Sweet harmony! ❤️",
    diff: "Different tastes — talk & blend 💬"
  },
  {
    text: "Baking pace?",
    A: "Slow & steady",
    B: "Fast & fun",
    match: "Same rhythm — beautiful 💞",
    diff: "Different pace — communicate ✨"
  },
  {
    text: "Final touch?",
    A: "Simple",
    B: "Decorated",
    match: "Shared vision 🎂",
    diff: "Different styles — mix magic ✨"
  }
];

/* AUTH */
signInAnonymously(auth).then(r => uid = r.user.uid);

/* UI helper */
function show(id) {
  document.querySelectorAll(".card > div").forEach(d => d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

/* NAME */
window.saveName = () => {
  name = nameInput.value.trim();
  if (!name) return;
  myName.innerText = name;
  show("roomScreen");
};

/* CREATE ROOM */
window.createRoom = async () => {
  roomId = Math.random().toString(36).substring(2,7).toUpperCase();

  await set(ref(db, "rooms/" + roomId), {
    step: 0,
    ready: false,
    players: {
      [uid]: { name, choice: null }
    }
  });

  roomCode.innerText = roomId;
  show("waitScreen");
  listen();
};

/* JOIN ROOM */
window.joinRoom = async () => {
  roomId = roomInput.value.trim().toUpperCase();
  if (!roomId) return;

  await set(ref(db, "rooms/" + roomId + "/players/" + uid), {
    name,
    choice: null
  });

  await update(ref(db, "rooms/" + roomId), {
    ready: true
  });

  show("waitScreen");
  listen();
};

/* LISTENER */
function listen() {
  onValue(ref(db, "rooms/" + roomId), snap => {
    const d = snap.val();
    if (!d || !d.ready) return;
    step = d.step || 0;
    startStep(d);
  });
}

/* START STEP */
function startStep(d) {
  const s = bakingSteps[d.step];
  if (!s) return;
  gameText.innerText = s.text;
  btnA.innerText = s.A;
  btnB.innerText = s.B;
  show("gameScreen");
}

/* CHOOSE */
window.choose = async (c) => {
  await update(ref(db, `rooms/${roomId}/players/${uid}`), {
    choice: c
  });

  onValue(ref(db, `rooms/${roomId}/players`), snap => {
    const players = Object.values(snap.val());
    if (players.length < 2) return;
    if (!players.every(p => p.choice)) return;

    const same = players[0].choice === players[1].choice;
    resultText.innerText = same
      ? bakingSteps[step].match
      : bakingSteps[step].diff;

    show("resultScreen");
  }, { onlyOnce: true });
};

/* NEXT */
window.nextStep = async () => {
  await update(ref(db, "rooms/" + roomId), {
    step: step + 1,
    players: Object.fromEntries(
      Object.entries((await (await fetch(
        `${firebaseConfig.databaseURL}/rooms/${roomId}/players.json`
      )).json())).map(([k,v]) => [k,{...v,choice:null}])
    )
  });
};
</script>

</body>
</html>
