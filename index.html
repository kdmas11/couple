<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Couples Compatibility Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .card {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 10px;
    width: 320px;
    text-align: center;
  }
  button {
    padding: 10px;
    margin: 8px 0;
    width: 100%;
    background: #ff4d6d;
    border: none;
    color: #fff;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
  }
  input {
    padding: 10px;
    width: 100%;
    border-radius: 6px;
    border: none;
    margin-bottom: 10px;
  }
  .hidden { display: none; }
</style>
</head>

<body>

<div class="card">

  <!-- HOME -->
  <div id="home">
    <h2>💖 Couples Game</h2>
    <button onclick="createRoom()">Create Room</button>
    <input id="roomInput" placeholder="Enter Room Code">
    <button onclick="joinRoom()">Join Room</button>
  </div>

  <!-- WAITING -->
  <div id="waiting" class="hidden">
    <h3>Waiting for partner...</h3>
    <p>Room Code:</p>
    <h2 id="roomCode"></h2>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <h3 id="question"></h3>
    <button onclick="submitAnswer('A')">Option A</button>
    <button onclick="submitAnswer('B')">Option B</button>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden">
    <h3 id="resultText"></h3>
    <button onclick="nextQuestion()">Next</button>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 REPLACE WITH YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId, roomId, role;
let currentQuestion = 0;

const questions = [
  "How do you handle arguments?",
  "What matters more: time or money?",
  "Are you a planner or spontaneous?"
];

signInAnonymously(auth).then(res => {
  userId = res.user.uid;
});

window.createRoom = async () => {
  roomId = Math.random().toString(36).substring(2, 7).toUpperCase();
  role = "playerA";

  await setDoc(doc(db, "rooms", roomId), {
    questionIndex: 0,
    playerA: {},
    playerB: {},
    status: "waiting"
  });

  document.getElementById("home").classList.add("hidden");
  document.getElementById("waiting").classList.remove("hidden");
  document.getElementById("roomCode").innerText = roomId;

  listenRoom();
};

window.joinRoom = async () => {
  roomId = document.getElementById("roomInput").value.trim().toUpperCase();
  if (!roomId) return alert("Enter room code");

  role = "playerB";
  await updateDoc(doc(db, "rooms", roomId), { status: "ready" });

  document.getElementById("home").classList.add("hidden");
  document.getElementById("waiting").classList.remove("hidden");

  listenRoom();
};

function listenRoom() {
  onSnapshot(doc(db, "rooms", roomId), snap => {
    const data = snap.data();
    if (!data) return;

    if (data.status === "ready") {
      document.getElementById("waiting").classList.add("hidden");
      document.getElementById("game").classList.remove("hidden");
      document.getElementById("question").innerText = questions[data.questionIndex];
    }

    if (data.playerA.answer && data.playerB.answer) {
      document.getElementById("game").classList.add("hidden");
      document.getElementById("result").classList.remove("hidden");

      const match = data.playerA.answer === data.playerB.answer;
      document.getElementById("resultText").innerText =
        match ? "💚 Great match!" : "💬 Different views — talk about it!";
    }
  });
}

window.submitAnswer = async (ans) => {
  await updateDoc(doc(db, "rooms", roomId), {
    [`${role}.answer`]: ans
  });
};

window.nextQuestion = async () => {
  currentQuestion++;

  if (currentQuestion >= questions.length) {
    alert("Game Over ❤️");
    location.reload();
    return;
  }

  await updateDoc(doc(db, "rooms", roomId), {
    questionIndex: currentQuestion,
    playerA: {},
    playerB: {}
  });

  document.getElementById("result").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
};
</script>

</body>
</html>
