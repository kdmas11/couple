<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cozy Kitchen – Multiplayer</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>

<style>
body{margin:0;background:#1e1615;color:#fff;font-family:sans-serif}
.hidden{display:none!important}
button{cursor:pointer}
canvas{background:#2d2321;display:block;margin:auto}
</style>
</head>

<body>

<div id="lobby" class="text-center p-8">
  <h1 class="text-4xl mb-6">🍰 Cozy Kitchen</h1>

  <div id="mode">
    <button id="hostBtn">Host</button>
    <button id="joinBtn">Join</button>
  </div>

  <div id="joinBox" class="hidden mt-4">
    <input id="roomId" placeholder="Paste room id" />
  </div>

  <div class="mt-4">
    <input id="name" placeholder="Your name" />
  </div>

  <button id="goBtn" class="mt-4">Continue</button>

  <div id="status" class="mt-4"></div>
  <button id="readyBtn" class="hidden mt-4">READY</button>
</div>

<canvas id="game" width="800" height="600" class="hidden"></canvas>

<script>
let peer, conn
let isHost = false
let localReady = false
let remoteReady = false
let myName = ""
let gameStarted = false

const lobby = document.getElementById("lobby")
const status = document.getElementById("status")
const readyBtn = document.getElementById("readyBtn")
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

document.getElementById("hostBtn").onclick = () => {
  isHost = true
  document.getElementById("joinBox").classList.add("hidden")
}

document.getElementById("joinBtn").onclick = () => {
  isHost = false
  document.getElementById("joinBox").classList.remove("hidden")
}

document.getElementById("goBtn").onclick = () => {
  myName = document.getElementById("name").value || "Player"
  init()
}

function init(){
  peer = new Peer()

  peer.on("open", id => {
    if(isHost){
      status.innerText = "Room ID: " + id
    } else {
      const rid = document.getElementById("roomId").value
      conn = peer.connect(rid)
      setupConn()
    }
  })

  peer.on("connection", c => {
    if(!conn){
      conn = c
      setupConn()
    }
  })
}

function setupConn(){
  conn.on("open", () => {
    status.innerText = "Connected"
    readyBtn.classList.remove("hidden")

    // 🔑 Always send name
    conn.send({type:"NAME",name:myName})
  })

  conn.on("data", msg => {
    if(msg.type === "NAME"){
      status.innerText = msg.name + " joined"
    }

    if(msg.type === "CLIENT_READY"){
      remoteReady = true
      checkReady()
    }

    if(msg.type === "HOST_READY"){
      remoteReady = true
      checkReady()
    }

    if(msg.type === "START"){
      startGame()
    }
  })
}

readyBtn.onclick = () => {
  localReady = true
  readyBtn.disabled = true
  readyBtn.innerText = "Waiting..."

  if(isHost){
    conn.send({type:"HOST_READY"})
  } else {
    conn.send({type:"CLIENT_READY"})
  }

  checkReady()
}

function checkReady(){
  if(localReady && remoteReady && isHost && !gameStarted){
    conn.send({type:"START"})
    startGame()
  }
}

function startGame(){
  if(gameStarted) return
  gameStarted = true

  lobby.classList.add("hidden")
  canvas.classList.remove("hidden")

  let x = isHost ? 200 : 600

  function loop(){
    ctx.clearRect(0,0,800,600)
    ctx.fillStyle = "#fff"
    ctx.font = "40px sans-serif"
    ctx.fillText(isHost?"🦊":"🐰", x, 300)
    requestAnimationFrame(loop)
  }
  loop()
}
</script>

</body>
</html>
